    ];

    window.triggerMagicDust = function(originX, originY) {
      const now2 = Date.now();
      if (now2 - window._magicDustLastFired < 3000) return;
      window._magicDustLastFired = now2;
      // Play random jingle with fade out (no repeat)
      try {
        let idx;
        do { idx = Math.floor(Math.random() * window._jingleSrcs.length); }
        while (window._jingleSrcs.length > 1 && idx === window._lastJingleIdx);
        window._lastJingleIdx = idx;
        const snd = new Audio(window._jingleSrcs[idx]);
        snd.volume = 0.7;
        snd.play().catch(() => {});
        // Fade out in last 0.5 seconds
        snd.addEventListener('timeupdate', function() {
          const remaining = snd.duration - snd.currentTime;
          if (remaining < 0.5 && remaining > 0) {
            snd.volume = Math.max(0, (remaining / 0.5) * 0.7);
          }
        });
      } catch(e) {}
      const canvas = document.createElement("canvas");
      canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const W = canvas.width;
      const H = canvas.height;
      const particles = [];
      const DURATION = 5500;
      const start = performance.now();

      // Wand sweeps from the tapped circle position up to upper right
      const startX = originX;
      const startY = originY;
      const wandPath = (t) => ({
        x: startX + (W * 1.04 - startX) * t,
        y: startY - (H * 0.32 * Math.sin(t * Math.PI)) - ((startY - H * 0.12) * t)
      });

      function randomColor() {
        const colors = [
          "rgba(255,255,255,",
          "rgba(180,210,255,",
          "rgba(100,160,255,",
          "rgba(210,235,255,",
          "rgba(255,255,255,",
          "rgba(140,190,255,",
          "rgba(200,225,255,",
          "rgba(255,255,255,",
        ];
        return colors[Math.floor(Math.random() * colors.length)];
      }

      function spawnParticles(wx, wy, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 3 + Math.random() * 9;
          const size = 1.5 + Math.random() * 3;
          particles.push({
            x: wx + (Math.random() - 0.5) * 80,
            y: wy + (Math.random() - 0.5) * 80,
            vx: Math.cos(angle) * speed * 2.0,
            vy: Math.sin(angle) * speed - 1.5,
            gravity: 0.025 + Math.random() * 0.02,
            size: size,
            life: 1.0,
            decay: 0.0012 + Math.random() * 0.0025,
            color: randomColor(),
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpeed: 0.25 + Math.random() * 0.45,
            shimmer: 0.4 + Math.random() * 0.6,
            star: true,
          });
        }
      }

      function spawnStar(wx, wy) {
        const arms = 8;
        for (let i = 0; i < arms; i++) {
          const angle = (i / arms) * Math.PI * 2;
          const speed = 3 + Math.random() * 6;
          particles.push({
            x: wx + (Math.random() - 0.5) * 10,
            y: wy + (Math.random() - 0.5) * 10,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.5,
            gravity: 0.05,
            size: 3 + Math.random() * 4,
            life: 1.0,
            decay: 0.009,
            color: "rgba(255,255,255,",
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpeed: 0.3,
            star: true,
          });
        }
      }

      // Initial burst from the checkbox position
      function initialBurst() {
        // Big immediate explosive ring burst
        for (let i = 0; i < 200; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 5 + Math.random() * 14;
          particles.push({
            x: startX + (Math.random() - 0.5) * 8,
            y: startY + (Math.random() - 0.5) * 8,
            vx: Math.cos(angle) * speed * 2.2,
            vy: Math.sin(angle) * speed - 3,
            gravity: 0.04 + Math.random() * 0.03,
            size: 1.5 + Math.random() * 4,
            life: 1.0,
            decay: 0.002 + Math.random() * 0.004,
            color: randomColor(),
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpeed: 0.25 + Math.random() * 0.45,
            shimmer: 0.4 + Math.random() * 0.6,
            star: true,
          });
        }
        // Bright star bursts right at the tap point
        for (let i = 0; i < 18; i++) {
          const angle = (i / 10) * Math.PI * 2;
          const speed = 6 + Math.random() * 8;
          particles.push({
            x: startX,
            y: startY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            gravity: 0.04,
            size: 4 + Math.random() * 4,
            life: 1.0,
            decay: 0.008,
            color: "rgba(255,255,255,",
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpeed: 0.3,
            shimmer: 0.8,
            star: true,
          });
        }
      }

      initialBurst();

      let lastSpawnTime = 0;

      function draw(now2) {
        const elapsed = now2 - start;
        const progress = Math.min(elapsed / DURATION, 1);
        const wandT = Math.min(elapsed / (DURATION * 0.2), 1);
        const wand = wandPath(wandT);

        ctx.clearRect(0, 0, W, H);

        if (elapsed < DURATION * 0.2 && elapsed - lastSpawnTime > 0) {
          spawnParticles(wand.x, wand.y, 35);
          if (Math.random() < 0.5) spawnStar(wand.x, wand.y);

          // Wand tip glow
          const grd = ctx.createRadialGradient(wand.x, wand.y, 0, wand.x, wand.y, 28);
          grd.addColorStop(0, "rgba(255,255,255,0.95)");
          grd.addColorStop(0.3, "rgba(150,200,255,0.6)");
          grd.addColorStop(1, "rgba(100,160,255,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(wand.x, wand.y, 28, 0, Math.PI * 2);
          ctx.fill();

          lastSpawnTime = elapsed;
        }

        // Update and draw particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.gravity;
          p.vx *= 0.985;
          p.life -= p.decay;
          p.twinkle += p.twinkleSpeed;

          if (p.life <= 0) { particles.splice(i, 1); continue; }

          const shimmer = p.shimmer || 0.5;
          const twinklePulse = Math.abs(Math.sin(p.twinkle));
          const twinkleAlpha = p.life * (1 - shimmer + shimmer * twinklePulse);
          const size = p.size * (0.4 + 0.6 * p.life) * (0.85 + 0.15 * twinklePulse);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.twinkle);

          // Outer glow
          const outerR = size * (p.size > 5 ? 4 : 3);
          const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, outerR);
          glow.addColorStop(0, p.color + (twinkleAlpha * 0.5) + ")");
          glow.addColorStop(1, p.color + "0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, outerR, 0, Math.PI * 2);
          ctx.fill();

          // 4-point star
          ctx.fillStyle = p.color + twinkleAlpha + ")";
          ctx.beginPath();
          const pts = 4;
          for (let s = 0; s < pts * 2; s++) {
            const a = (s / (pts * 2)) * Math.PI * 2;
            const r = s % 2 === 0 ? size * 2.2 : size * 0.75;
            s === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
                    : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();

          // Bright center
          ctx.fillStyle = "rgba(255,255,255," + twinkleAlpha + ")";
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
          ctx.fill();

          // Shimmer cross — thin perpendicular lines that pulse
          const crossAlpha = twinkleAlpha * twinklePulse * 1.2;
          if (crossAlpha > 0.05) {
            ctx.strokeStyle = "rgba(255,255,255," + crossAlpha + ")";
            ctx.lineWidth = size * 0.28;
            ctx.beginPath();
            ctx.moveTo(-size * 3.5, 0); ctx.lineTo(size * 3.5, 0);
            ctx.moveTo(0, -size * 3.5); ctx.lineTo(0, size * 3.5);
            ctx.stroke();
          }

          ctx.restore();
        }

        // Fade out
        if (progress > 0.78) {
          canvas.style.opacity = String(1 - ((progress - 0.78) / 0.22));
        }

        if (progress < 1 || particles.length > 0) {
          requestAnimationFrame(draw);
        } else {
          canvas.remove();
        }
      }

      requestAnimationFrame(draw);
    };
  </script>

function addDays(dateStr, days) {
  const d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}
function buildTrainingData(startDate) {
  return rawSchedule.map((s) => ({ ...s, date: addDays(startDate, s.offset) }));
}
function fmtShort(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtFull(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtDay(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { weekday: "long" });
}
function getCurrentIdx(data, completed) {
  const now = new Date();
  const todayStr = now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");
  for (let i = 0; i < data.length; i++) {
    if (data[i].date >= todayStr && !completed[i]) return i;
  }
  return data.length - 1;
}

// Parse time string (h:mm:ss or mm:ss) to total minutes
function parseTimeToMins(t) {
  if (!t) return null;
  const parts = t.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0] * 60 + parts[1] + parts[2] / 60;
  if (parts.length === 2) return parts[0] + parts[1] / 60;
  return null;
}

function calcPace(totalTimeMmSs, miles) {
  const totalMins = parseTimeToMins(totalTimeMmSs);
  if (!totalMins || !miles || parseFloat(miles) <= 0) return null;
  const paceMins = totalMins / parseFloat(miles);
  const paceMin = Math.floor(paceMins);
  const paceSec = Math.round((paceMins - paceMin) * 60);
  return paceMin + ":" + String(paceSec).padStart(2, "0");
}

function PacePreview({ time, miles, color }) {
  const pace = calcPace(time, miles);
  if (!pace) return null;
  return (
    <div style={{ marginTop: "0.4rem", fontFamily: "'Barlow', sans-serif", fontSize: "0.7rem", color: color || "#2e7d32", fontWeight: 600 }}>

  );
}

function MagicMileLog({ idx, logs, setLogs, distanceMiles }) {
  const saved = logs[idx] || {};
  const [editing, setEditing] = useState(false);
  const [mmTime, setMmTime] = useState(saved.mmTime || "");
  const [remainTime, setRemainTime] = useState(saved.remainTime || "");
  // remaining miles = total distance - 1 magic mile
  const remainMiles = distanceMiles ? Math.max(0, parseFloat(distanceMiles) - 1) : null;
  const remainPace = remainMiles > 0 ? calcPace(remainTime, remainMiles) : null;

  const save = (e) => {
    e.stopPropagation();
    const pace = remainMiles > 0 ? calcPace(remainTime, remainMiles) : null;
    setLogs(p => ({ ...p, [idx]: { mmTime, remainTime, pace } }));

  const [modalStatus, setModalStatus] = useState(null);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const p = JSON.parse(saved);
        setCompleted(p.completed || {});
        setNotes(p.notes || {});
        setWorkoutLogs(p.workoutLogs || {});
        if (p.startDate) {
          setStartDate(p.startDate);
          setPendingStart(p.startDate);
          setPendingRace(addDays(p.startDate, RACE_OFFSET));
        }
      }
    } catch(e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ completed, notes, workoutLogs, startDate })); } catch(e) {}
  }, [completed, notes, workoutLogs, startDate, loaded]);

  useEffect(() => {
  document.body.className = view === "schedule" ? "schedule-view" : "stats-view";
}, [view]);

  const setLogsForIdx = (idx) => (updater) => setWorkoutLogs(prev => {

    return next;
  });

  const onStartChange = (v) => { setPendingStart(v); if (v) setPendingRace(addDays(v, RACE_OFFSET)); };

  const applyDates = () => { setStartDate(pendingStart); setShowPicker(false); };

  const openExport = () => {
    setDataModalMode("export");
    setModalStatus(null);
    setImportText("");
    setShowDataModal(true);
  };
  const openImport = () => {
    setDataModalMode("import");
    setModalStatus(null);
    setImportText("");
    setShowDataModal(true);
  };
  const getExportJson = () => {
    return JSON.stringify({ completed, notes, workoutLogs, startDate }, null, 2);
  };
  const copyExport = () => {
    try {
      const json = getExportJson();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(json).then(() => setModalStatus({ ok: true, msg: "Copied to clipboard! Paste it somewhere safe." }));
      } else {
        const el = document.createElement("textarea");
        el.value = json;
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        setModalStatus({ ok: true, msg: "Copied to clipboard! Paste it somewhere safe." });
      }
    } catch(e) { setModalStatus({ ok: false, msg: "Copy failed. Please select all text and copy manually." }); }
  };
  const doImport = () => {
    try {
      const p = JSON.parse(importText.trim());
      if (typeof p !== "object" || p === null) throw new Error("Invalid");
      if (p.completed)    setCompleted(p.completed);
      if (p.notes)        setNotes(p.notes);
      if (p.workoutLogs)  setWorkoutLogs(p.workoutLogs);
      if (p.startDate)  { setStartDate(p.startDate); setPendingStart(p.startDate); setPendingRace(addDays(p.startDate, RACE_OFFSET)); }
      setModalStatus({ ok: true, msg: "Data imported successfully! You can close this." });

      setModalStatus({ ok: false, msg: "Invalid data. Make sure you pasted the full exported text." });

                          distanceMiles={parseFloat(session.workout)} />
                      )}

                      {/* Note */}
                      {notes[session.idx] && <div className="ntxt">📝 {notes[session.idx]}</div>}
                      {editingNote === session.idx ? (
                        <div className="nwrap" onClick={e => e.stopPropagation()}>
                          <input className="ninput" value={noteText} onChange={e => setNoteText(e.target.value)}
                            placeholder="Add a note..." onKeyDown={e => e.key === "Enter" && saveNote(session.idx)} autoFocus />
                          <button className="nsave" onClick={() => saveNote(session.idx)}>Save</button>
                        </div>
                      ) : (
                        <button className="nbtn" onClick={e => { e.stopPropagation(); setNoteText(notes[session.idx] || ""); setEditingNote(session.idx); }}>
                          {notes[session.idx] ? "Edit Note" : "+ Note"}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {view === "stats" && (
          <div>
            <div className="rcd">
              <div className="rcnum">{daysLeft}</div>
              <div className="rclbl">Days Until Race Day &middot; {fmtFull(raceDate)}</div>
            </div>

            <div className="sc">
              <div className="sct">Overall Progress</div>
              <div style={{ display: "flex", gap: "2rem", flexWrap: "wrap" }}>
                <div><div className="bnum">{done}</div><div className="blbl">Runs Completed</div></div>
                <div><div className="bnum" style={{ color: "#2e7d32" }}>{totalMilesLogged.toFixed(2)}</div><div className="blbl">Miles</div></div>
                <div><div className="bnum" style={{ color: "#43a047" }}>{total - done}</div><div className="blbl">Remaining</div></div>
                <div><div className="bnum" style={{ color: "#e65100" }}>{pct}%</div><div className="blbl">Complete</div></div>
              </div>
            </div>

            <div className="sc">
              <div className="sct">Run Breakdown</div>
              <div className="tbd">
                {Object.entries(typeStyles).map(([type, ts]) => {
                  const count = trainingData.filter(s => s.type === type).length;
                  const doneCount = trainingData.filter((s, i) => s.type === type && completed[i]).length;
                  return (
                    <div key={type} className="trow">
                      <div className="tdot" style={{ background: ts.border }} />
                      <div className="tinfo">
                        <div className="tname">{ts.label}</div>
                        <div className="tcnt">{doneCount} / {count}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {mmHistory.length > 0 && (
              <div className="sc">
                <div className="sct">Magic Mile History</div>
                <table className="mm-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>MM Time</th>
                      <th>Rem. Time</th>
                      <th>Rem. Pace</th>
                    </tr>
                  </thead>
                  <tbody>
                    {mmHistory.map((mm, i) => (
                      <tr key={i}>
                        <td>{fmtShort(mm.date)}</td>
                        <td>{mm.mmTime ? <strong style={{ color: "#e65100" }}>{mm.mmTime}</strong> : "—"}</td>
                        <td>{mm.remainTime || "—"}</td>
                        <td>{mm.pace ? mm.pace + " /mi" : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div className="sc">
              <div className="sct">Training Timeline</div>
              <div className="timeline-wrap">
                {trainingData.map((s, i) => {
                  const ts = typeStyles[s.type] || typeStyles.run;
                  return <div key={i} title={fmtShort(s.date) + ": " + s.workout} className="timeline-sq"
                    style={{ background: completed[i] ? ts.border : "#dde3ed", opacity: completed[i] ? 1 : 0.6 }} />;
                })}
              </div>
              <div className="timeline-legend">Each square = one run · Colored when complete</div>
            </div>
          </div>
        )}
      </div>
      {/* ── EXPORT / IMPORT MODAL ── */}
      {showDataModal && (
        <div className="modal-overlay" onClick={() => setShowDataModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            {dataModalMode === "export" ? (
              <>
                <div className="modal-title">📤 Export Your Data</div>
                <div className="modal-sub">
                  Copy this text and save it somewhere safe (Notes app, email to yourself, etc.).
                  You can use it to restore your data in a new install.
                </div>
                <textarea className="modal-textarea" readOnly value={getExportJson()}
                  onFocus={e => e.target.select()} />
                {modalStatus && (
                  <div className={"modal-status " + (modalStatus.ok ? "ok" : "err")}>{modalStatus.msg}</div>
                )}
                <div className="modal-btns">
                  <button className="modal-btn success" onClick={copyExport}>📋 Copy to Clipboard</button>
                  <button className="modal-btn ghost" onClick={() => setShowDataModal(false)}>Close</button>
                </div>
              </>
            ) : (
              <>
                <div className="modal-title">📥 Import Your Data</div>
                <div className="modal-sub">
                  Paste your previously exported data below. This will overwrite your current data.
                </div>
                <textarea className="modal-textarea" value={importText}
                  onChange={e => { setImportText(e.target.value); setModalStatus(null); }}
                  placeholder="Paste your exported data here..." />
                {modalStatus && (
                  <div className={"modal-status " + (modalStatus.ok ? "ok" : "err")}>{modalStatus.msg}</div>
                )}
                <div className="modal-btns">
                  <button className="modal-btn danger" onClick={doImport}>📥 Import & Restore</button>
                  <button className="modal-btn ghost" onClick={() => setShowDataModal(false)}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
