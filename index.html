function addDays(dateStr, days) {
  const d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}
function buildTrainingData(startDate) {
  return rawSchedule.map((s) => ({ ...s, date: addDays(startDate, s.offset) }));
}
function fmtShort(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtFull(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtDay(dateStr) {
  return new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { weekday: "long" });
}
function getCurrentIdx(data, completed) {
  const now = new Date();
  const todayStr = now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");
  for (let i = 0; i < data.length; i++) {
    if (data[i].date >= todayStr && !completed[i]) return i;
  }
  return data.length - 1;
}

// Parse time string (h:mm:ss or mm:ss) to total minutes
function parseTimeToMins(t) {
  if (!t) return null;
  const parts = t.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0] * 60 + parts[1] + parts[2] / 60;
  if (parts.length === 2) return parts[0] + parts[1] / 60;
  return null;
}

function calcPace(totalTimeMmSs, miles) {
  const totalMins = parseTimeToMins(totalTimeMmSs);
  if (!totalMins || !miles || parseFloat(miles) <= 0) return null;
  const paceMins = totalMins / parseFloat(miles);
  const paceMin = Math.floor(paceMins);
  const paceSec = Math.round((paceMins - paceMin) * 60);
  return paceMin + ":" + String(paceSec).padStart(2, "0");
}

function PacePreview({ time, miles, color }) {
  const pace = calcPace(time, miles);
  if (!pace) return null;
  return (
    <div style={{ marginTop: "0.4rem", fontFamily: "'Barlow', sans-serif", fontSize: "0.7rem", color: color || "#2e7d32", fontWeight: 600 }}>

  );
}

function MagicMileLog({ idx, logs, setLogs, distanceMiles }) {
  const saved = logs[idx] || {};
  const [editing, setEditing] = useState(false);
  const [mmTime, setMmTime] = useState(saved.mmTime || "");
  const [remainTime, setRemainTime] = useState(saved.remainTime || "");
  // remaining miles = total distance - 1 magic mile
  const remainMiles = distanceMiles ? Math.max(0, parseFloat(distanceMiles) - 1) : null;
  const remainPace = remainMiles > 0 ? calcPace(remainTime, remainMiles) : null;

  const save = (e) => {
    e.stopPropagation();
    const pace = remainMiles > 0 ? calcPace(remainTime, remainMiles) : null;
    setLogs(p => ({ ...p, [idx]: { mmTime, remainTime, pace } }));

  const [modalStatus, setModalStatus] = useState(null);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const p = JSON.parse(saved);
        setCompleted(p.completed || {});
        setNotes(p.notes || {});
        setWorkoutLogs(p.workoutLogs || {});
        if (p.startDate) {
          setStartDate(p.startDate);
          setPendingStart(p.startDate);
          setPendingRace(addDays(p.startDate, RACE_OFFSET));
        }
      }
    } catch(e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ completed, notes, workoutLogs, startDate })); } catch(e) {}
  }, [completed, notes, workoutLogs, startDate, loaded]);

  const setLogsForIdx = (idx) => (updater) => setWorkoutLogs(prev => {
    const next = typeof updater === "function" ? updater(prev) : updater;
    return next;
  });

  const openExport = () => {
    setDataModalMode("export");
    setModalStatus(null);
    setImportText("");
    setShowDataModal(true);
  };
  const openImport = () => {
    setDataModalMode("import");
    setModalStatus(null);
    setImportText("");
    setShowDataModal(true);
  };
  const getExportJson = () => {
    return JSON.stringify({ completed, notes, workoutLogs, startDate }, null, 2);
  };
  const copyExport = () => {
    try {
      const json = getExportJson();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(json).then(() => setModalStatus({ ok: true, msg: "Copied to clipboard! Paste it somewhere safe." }));
      } else {
        const el = document.createElement("textarea");
        el.value = json;
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        setModalStatus({ ok: true, msg: "Copied to clipboard! Paste it somewhere safe." });
      }
    } catch(e) { setModalStatus({ ok: false, msg: "Copy failed. Please select all text and copy manually." }); }
  };
  const doImport = () => {
    try {
      const p = JSON.parse(importText.trim());
      if (typeof p !== "object" || p === null) throw new Error("Invalid");
      if (p.completed)    setCompleted(p.completed);
      if (p.notes)        setNotes(p.notes);
      if (p.workoutLogs)  setWorkoutLogs(p.workoutLogs);

                      <div className="smeta">
                        <span className="dchip">{fmtDay(session.date)}, {fmtShort(session.date)}</span>
                        <span className="tbadge" style={{ background: ts.bg, color: ts.text, borderColor: ts.border + "55" }}>{ts.label}</span>
                        {isCur && !isDone && <span className="nextrun-chip">Next Run</span>}
                      </div>
                      <div className={"wname " + (isRace ? "race-wname" : "")}>{session.workout}</div>

                      {/* ── TYPE-SPECIFIC LOG PANELS ── */}
                      {session.type === "cardio" && (
                        <CardioLog idx={session.idx} logs={workoutLogs} setLogs={setWorkoutLogs} />
                      )}
                      {(session.type === "run") && (
                        <RunLog idx={session.idx} logs={workoutLogs} setLogs={setWorkoutLogs}
                          distanceMiles={parseFloat(session.workout)} />
                      )}
                      {(session.type === "long") && (
                        <LongRunLog idx={session.idx} logs={workoutLogs} setLogs={setWorkoutLogs}
                          distanceMiles={parseFloat(session.workout)} />
                      )}
                      {session.type === "special" && (
                        <MagicMileLog idx={session.idx} logs={workoutLogs} setLogs={setWorkoutLogs}
                          distanceMiles={parseFloat(session.workout)} />
                      )}

                      {/* Note */}
                      {notes[session.idx] && <div className="ntxt">📝 {notes[session.idx]}</div>}
                      {editingNote === session.idx ? (
                        <div className="nwrap" onClick={e => e.stopPropagation()}>
                          <input className="ninput" value={noteText} onChange={e => setNoteText(e.target.value)}
                            placeholder="Add a note..." onKeyDown={e => e.key === "Enter" && saveNote(session.idx)} autoFocus />
                          <button className="nsave" onClick={() => saveNote(session.idx)}>Save</button>
                        </div>
                      ) : (
                        <button className="nbtn" onClick={e => { e.stopPropagation(); setNoteText(notes[session.idx] || ""); setEditingNote(session.idx); }}>
                          {notes[session.idx] ? "Edit Note" : "+ Note"}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {view === "stats" && (
          <div>
            <div className="rcd">
              <div className="rcnum">{daysLeft}</div>
              <div className="rclbl">Days Until Race Day &middot; {fmtFull(raceDate)}</div>
            </div>

            <div className="sc">
              <div className="sct">Overall Progress</div>
              <div style={{ display: "flex", gap: "2rem", flexWrap: "wrap" }}>
                <div><div className="bnum">{done}</div><div className="blbl">Runs Completed</div></div>
                <div><div className="bnum" style={{ color: "#2e7d32" }}>{totalMilesLogged.toFixed(2)}</div><div className="blbl">Miles</div></div>
                <div><div className="bnum" style={{ color: "#43a047" }}>{total - done}</div><div className="blbl">Remaining</div></div>
                <div><div className="bnum" style={{ color: "#e65100" }}>{pct}%</div><div className="blbl">Complete</div></div>
              </div>
            </div>

            <div className="sc">
              <div className="sct">Run Breakdown</div>
              <div className="tbd">
                {Object.entries(typeStyles).map(([type, ts]) => {
                  const count = trainingData.filter(s => s.type === type).length;
                  const doneCount = trainingData.filter((s, i) => s.type === type && completed[i]).length;
                  return (
                    <div key={type} className="trow">
                      <div className="tdot" style={{ background: ts.border }} />
                      <div className="tinfo">
                        <div className="tname">{ts.label}</div>
                        <div className="tcnt">{doneCount} / {count}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {mmHistory.length > 0 && (
              <div className="sc">
                <div className="sct">Magic Mile History</div>
                <table className="mm-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>MM Time</th>
                      <th>Rem. Time</th>
                      <th>Rem. Pace</th>
                    </tr>
                  </thead>
                  <tbody>
                    {mmHistory.map((mm, i) => (
                      <tr key={i}>
                        <td>{fmtShort(mm.date)}</td>
                        <td>{mm.mmTime ? <strong style={{ color: "#e65100" }}>{mm.mmTime}</strong> : "—"}</td>
                        <td>{mm.remainTime || "—"}</td>
                        <td>{mm.pace ? mm.pace + " /mi" : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div className="sc">
              <div className="sct">Training Timeline</div>
              <div className="timeline-wrap">
                {trainingData.map((s, i) => {
                  const ts = typeStyles[s.type] || typeStyles.run;
                  return <div key={i} title={fmtShort(s.date) + ": " + s.workout} className="timeline-sq"
                    style={{ background: completed[i] ? ts.border : "#dde3ed", opacity: completed[i] ? 1 : 0.6 }} />;
                })}
              </div>
              <div className="timeline-legend">Each square = one run · Colored when complete</div>
            </div>
          </div>
        )}
      </div>
      {/* ── EXPORT / IMPORT MODAL ── */}
      {showDataModal && (
        <div className="modal-overlay" onClick={() => setShowDataModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            {dataModalMode === "export" ? (
              <>
                <div className="modal-title">📤 Export Your Data</div>
                <div className="modal-sub">
                  Copy this text and save it somewhere safe (Notes app, email to yourself, etc.).
                  You can use it to restore your data in a new install.
                </div>
                <textarea className="modal-textarea" readOnly value={getExportJson()}
                  onFocus={e => e.target.select()} />
                {modalStatus && (
                  <div className={"modal-status " + (modalStatus.ok ? "ok" : "err")}>{modalStatus.msg}</div>
                )}
                <div className="modal-btns">
                  <button className="modal-btn success" onClick={copyExport}>📋 Copy to Clipboard</button>
                  <button className="modal-btn ghost" onClick={() => setShowDataModal(false)}>Close</button>
                </div>
              </>
            ) : (
              <>
                <div className="modal-title">📥 Import Your Data</div>
                <div className="modal-sub">
                  Paste your previously exported data below. This will overwrite your current data.
                </div>
                <textarea className="modal-textarea" value={importText}
                  onChange={e => { setImportText(e.target.value); setModalStatus(null); }}
                  placeholder="Paste your exported data here..." />
                {modalStatus && (
                  <div className={"modal-status " + (modalStatus.ok ? "ok" : "err")}>{modalStatus.msg}</div>
                )}
                <div className="modal-btns">
                  <button className="modal-btn danger" onClick={doImport}>📥 Import & Restore</button>
                  <button className="modal-btn ghost" onClick={() => setShowDataModal(false)}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
